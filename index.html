<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Desk - Abertura de Chamados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Cria o fundo em degradê roxo e garante que ocupe a tela toda */
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
</head>

<body>

  <div class="container mt-5">
    <h2 class="mb-4 text-white">M-Desk | Gestão de Chamados</h2>

    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="card-title mb-0">Novo Chamado</h5>
          </div>
          <div class="card-body">
            <form id="form-chamado">
              <div class="mb-3">
                <label class="form-label">Título do Problema</label>
                <input type="text" id="titulo" class="form-control" placeholder="Ex: Falha no login do Windows" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Categoria</label>
                <select id="categoria" class="form-select" required>
                  <option value="">Selecione...</option>
                  <option value="Frente de Caixa/PDV">Frente de Caixa/PDV</option>
                  <option value="Impressoras">Impressoras (Spooler/Drivers)</option>
                  <option value="Infraestrutura/Rede">Infraestrutura e Rede</option>
                  <option value="Hardware">Hardware (Desktop/TV Box)</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Descrição Detalhada</label>
                <textarea id="descricao" class="form-control" rows="3" placeholder="Descreva o que está acontecendo..." required></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100">Abrir Chamado</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Meus Chamados Recentes</h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="carregarChamados()">Atualizar</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Título</th>
                  <th>Categoria</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="tabela-chamados">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/chamados';

    // Função para buscar os chamados no banco (GET)
    async function carregarChamados() {
      try {
        const response = await fetch(API_URL);
        const chamados = await response.json();

        const tbody = document.getElementById('tabela-chamados');
        tbody.innerHTML = ''; // Limpa a tabela antes de preencher

        chamados.forEach(chamado => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
                    <td>#${chamado.id}</td>
                    <td><strong>${chamado.titulo}</strong></td>
                    <td><span class="badge bg-secondary">${chamado.categoria}</span></td>
                    <td><span class="badge ${chamado.status === 'Aberto' ? 'bg-success' : 'bg-warning'}">${chamado.status}</span></td>
                `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        console.error('Erro ao carregar chamados:', error);
      }
    }

    // (POST)
    document.getElementById('form-chamado').addEventListener('submit', async function (e) {
      e.preventDefault(); // Evita que a página recarregue

      const dados = {
        titulo: document.getElementById('titulo').value,
        categoria: document.getElementById('categoria').value,
        descricao: document.getElementById('descricao').value,
        usuario_id: 1 // Usuário fixo para testes
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        if (response.status === 201) {
          alert('Chamado aberto com sucesso!');
          document.getElementById('form-chamado').reset(); // Limpa o formulário
          carregarChamados(); // Atualiza a tabela na mesma hora
        }
      } catch (error) {
        alert('Erro ao abrir o chamado.');
        console.error(error);
      }
    });

    // Carrega a tabela automaticamente assim que a página abre
    carregarChamados();
  </script>

</body>

</html>
