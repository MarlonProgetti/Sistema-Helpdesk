<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Desk | Gestão de Chamados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
</head>

<body>

  <div class="container mt-5">
    <h2 class="mb-4 text-white">M-Desk | Gestão de Chamados</h2>

    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="card-title mb-0">Novo Chamado</h5>
          </div>
          <div class="card-body">
            <form id="form-chamado">
              <div class="mb-3">
                <label class="form-label">Título do Problema</label>
                <input type="text" id="titulo" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Categoria</label>
                <select id="categoria" class="form-select" required>
                  <option value="">Selecione...</option>
                  <option value="Frente de Caixa/PDV">Frente de Caixa/PDV</option>
                  <option value="Impressoras">Impressoras (Spooler/Drivers)</option>
                  <option value="Infraestrutura/Rede">Infraestrutura e Rede</option>
                  <option value="Hardware">Hardware (Desktop/TV Box)</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Descrição Detalhada</label>
                <textarea id="descricao" class="form-control" rows="3" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100">Abrir Chamado</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Painel de Atendimento</h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="carregarChamados()">Atualizar</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Título</th>
                  <th>Status</th>
                  <th>Ação</th>
                </tr>
              </thead>
              <tbody id="tabela-chamados">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalAtendimento" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Atender Chamado #<span id="modal-id-display"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="form-atendimento">
            <input type="hidden" id="modal-id-chamado">
            <div class="mb-3">
              <label class="form-label">Novo Status</label>
              <select id="modal-status" class="form-select" required>
                <option value="Em Atendimento">Em Atendimento</option>
                <option value="Aguardando Peça">Aguardando Peça</option>
                <option value="Resolvido">Resolvido</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Nota de Resolução do Técnico</label>
              <textarea id="modal-nota" class="form-control" rows="4" placeholder="Descreva o que foi feito..." required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">Salvar Atendimento</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = 'http://localhost:5000/api/chamados';
    const modalBootstrap = new bootstrap.Modal(document.getElementById('modalAtendimento'));

    // 1. CARREGAR CHAMADOS (GET)
    async function carregarChamados() {
      try {
        const response = await fetch(API_URL);
        const chamados = await response.json();
        const tbody = document.getElementById('tabela-chamados');
        tbody.innerHTML = '';

        chamados.forEach(chamado => {
          // Define a cor do badge baseado no status
          let corStatus = 'bg-warning';
          if (chamado.status === 'Resolvido') corStatus = 'bg-success';
          if (chamado.status === 'Aberto') corStatus = 'bg-danger';

          const tr = document.createElement('tr');
          tr.innerHTML = `
                    <td>#${chamado.id}</td>
                    <td>
                        <strong>${chamado.titulo}</strong><br>
                        <small class="text-muted">${chamado.categoria}</small>
                    </td>
                    <td><span class="badge ${corStatus}">${chamado.status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="abrirModal(${chamado.id})">Atender</button>
                    </td>
                `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        console.error('Erro:', error);
      }
    }

    // 2. ABRIR NOVO CHAMADO (POST)
    document.getElementById('form-chamado').addEventListener('submit', async function (e) {
      e.preventDefault();
      const dados = {
        titulo: document.getElementById('titulo').value,
        categoria: document.getElementById('categoria').value,
        descricao: document.getElementById('descricao').value,
        usuario_id: 1
      };
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });
        document.getElementById('form-chamado').reset();
        carregarChamados();
      } catch (error) { console.error(error); }
    });

    // 3. ABRIR O MODAL DO TÉCNICO
    function abrirModal(id) {
      document.getElementById('modal-id-chamado').value = id; // Guarda o ID no campo oculto
      document.getElementById('modal-id-display').innerText = id; // Mostra o ID no título
      document.getElementById('modal-nota').value = ''; // Limpa a caixa de texto
      modalBootstrap.show(); // Faz o modal pular na tela
    }

    // 4. SALVAR O ATENDIMENTO (PUT)
    document.getElementById('form-atendimento').addEventListener('submit', async function (e) {
      e.preventDefault();

      const id = document.getElementById('modal-id-chamado').value;
      const dadosAtualizacao = {
        status: document.getElementById('modal-status').value,
        nota_resolucao: document.getElementById('modal-nota').value
      };

      try {
        await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dadosAtualizacao)
        });
        modalBootstrap.hide(); // Esconde o modal
        carregarChamados(); // Atualiza a tabela pra ver a mudança de cor!
      } catch (error) { console.error(error); }
    });

    // Inicia a tabela ao abrir
    carregarChamados();
  </script>

</body>

</html>
